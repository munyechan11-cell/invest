# Render Blueprint — 한 번 클릭으로 배포
# 사용법: https://render.com/deploy 에서 이 repo 선택
services:
  - type: web
    name: toss-quant
    runtime: python
    plan: starter            # Free→Starter (sleep 없음, 0.5 CPU)
    region: singapore
    healthCheckPath: /api/ping  # 죽으면 Render가 자동 재시작
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server.main:app --host 0.0.0.0 --port $PORT
    disk:                    # 영구 저장소 — DB/캐시가 배포 후에도 살아남음
      name: toss-data
      mountPath: /var/data
      sizeGB: 1              # $1/월. 1GB면 SQLite 수년치 충분
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: HOST
        value: 0.0.0.0
      - key: DB_PATH         # 영구 디스크에 DB 저장
        value: /var/data/toss.db
      - key: LOG_FORMAT      # JSON 로그 (Render에서 검색·필터 쉬움)
        value: json
      # 아래 키들은 Render 대시보드에서 직접 입력
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_PAPER
        value: "true"
      - key: FINNHUB_API_KEY
        sync: false
      - key: KIS_APP_KEY
        sync: false
      - key: KIS_APP_SECRET
        sync: false
      - key: KIS_PAPER
        value: "true"
      - key: NAVER_CLIENT_ID
        sync: false
      - key: NAVER_CLIENT_SECRET
        sync: false
      - key: DART_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true   # Render가 자동 생성
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
