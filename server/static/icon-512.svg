<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="char-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1E26"/>
      <stop offset="100%" stop-color="#0B0D11"/>
    </linearGradient>
    <linearGradient id="gold-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5C84F"/>
      <stop offset="55%" stop-color="#F0B429"/>
