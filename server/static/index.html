<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Toss — Quant Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          cream: { 50:'#000000', 100:'#0a0a0a', 200:'#171717', 300:'#262626', 400:'#404040' },
          ink:   { 900:'#ffffff', 800:'#f3f4f6', 700:'#d1d5db', 600:'#9ca3af', 500:'#6b7280' },
          coral: { 50:'#022c22', 100:'#064e3b', 400:'#34d399', 500:'#10b981', 600:'#059669', 700:'#047857' },
          olive: { 500:'#10b981', 600:'#059669' },
          rust:  { 500:'#ef4444', 600:'#dc2626' },
        },
        fontFamily: {
          serif: ['Inter','ui-sans-serif','system-ui','sans-serif'],
          sans: ['Inter','ui-sans-serif','system-ui','sans-serif'],
          mono: ['"JetBrains Mono"','ui-monospace','monospace'],
        },
        boxShadow: {
          soft: '0 1px 2px rgba(0,0,0,0.5)',
          glow: '0 0 0 1px rgba(16,185,129,0.25), 0 8px 24px rgba(16,185,129,0.18)',
        },
      }
    }
  }
</script>
<style>
  html, body { background: #000000; color: #ffffff; font-family: Inter, system-ui, sans-serif; }
  body { background-image: none; }
  .serif { font-family: Inter, sans-serif; font-weight: 600; letter-spacing: -0.02em; }
  .surface { background: #0a0a0a; border: 1px solid #222222; border-radius: 12px; }
  .surface-elevated { background: #0a0a0a; border: 1px solid #222222; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.8); }
  .pill { display: inline-flex; align-items:center; gap:6px; padding: 4px 10px; border-radius: 4px; font-size: 11.5px; font-weight: 600; letter-spacing: 0.01em; }
  .pill-coral { background:#064e3b; color:#34d399; }
  .pill-olive { background:#064e3b; color:#34d399; }
  .pill-rust  { background:#450a0a; color:#f87171; }
  .pill-stone { background:#222222; color:#d1d5db; }
  .input { background:#000000; border:1px solid #333333; color:#ffffff; border-radius:8px; padding:10px 12px; font-size:14px; outline:none; transition:.15s; }
  .input:focus { border-color:#10b981; box-shadow: 0 0 0 1px #10b981; }
  .btn { font-weight:600; padding:10px 14px; border-radius:8px; transition:.15s; font-size:14px; }
  .btn-primary { background:#ffffff; color:#000000; }
  .btn-primary:hover { background:#d1d5db; }
  .btn-primary:disabled { opacity:.5; }
  .btn-ghost { background:transparent; color:#d1d5db; border:1px solid #333333; }
  .btn-ghost:hover { background:#222222; }
  .divider { height:1px; background: #222222; }
  .flash-in { animation: flashIn .9s ease; }
  @keyframes flashIn { 0%{ background:#1f2937; transform: translateY(-3px) } 100%{ background:transparent; transform:none } }
  .pulse-dot { width:7px; height:7px; border-radius:50%; background:#10b981; box-shadow:0 0 0 0 rgba(16,185,129,.6); animation: pulseDot 1.6s infinite; }
  .pulse-dot.off { background:#ef4444; animation:none; box-shadow:none; }
  @keyframes pulseDot { 0%{ box-shadow:0 0 0 0 rgba(16,185,129,.5)} 70%{ box-shadow:0 0 0 8px rgba(16,185,129,0)} 100%{ box-shadow:0 0 0 0 rgba(16,185,129,0)} }
  .ticker-up   { color:#10b981; }
  .ticker-down { color:#ef4444; }
  .frame-chip { background: #111111; border:1px solid #333333; padding:4px 10px; border-radius:4px; font-size:11.5px; color:#9ca3af; }
  ::selection { background:#10b981; color:#000000; }
  .scroll-soft::-webkit-scrollbar { width:8px; }
  .scroll-soft::-webkit-scrollbar-thumb { background:#333333; border-radius:8px; }
  .overlay { position:fixed; inset:0; z-index:50; background:rgba(0,0,0,0.85); display:flex; align-items:center; justify-content:center; }
  .modal { background:#0a0a0a; border:1px solid #333; border-radius:16px; padding:32px; width:360px; }
</style>
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="app()" x-init="init()" class="min-h-screen">

<!-- 로그인 오버레이 -->
<div x-show="!user" class="overlay">
  <div class="modal space-y-4">
    <div class="text-center">
      <div class="serif text-3xl font-semibold mb-1">Toss</div>
      <div class="text-sm text-ink-500">투자 분석 플랫폼</div>
    </div>
    <input x-model="authForm.username" placeholder="아이디" class="input w-full">
    <input x-model="authForm.password" type="password" placeholder="비밀번호" class="input w-full">
    <button @click="doLogin" class="btn btn-primary w-full">로그인</button>
    <button @click="doRegister" class="btn btn-ghost w-full">회원가입</button>
    <div x-show="authError" class="text-sm text-red-400 text-center" x-text="authError"></div>
  </div>
</div>

<!-- 매매기록 모달 -->
<div x-show="showTradeModal" class="overlay" @click.self="showTradeModal=false">
  <div class="modal space-y-4">
    <div class="serif text-xl font-semibold">매매 기록 추가</div>
    <div class="text-sm text-ink-500" x-text="tradeForm.symbol"></div>
    <select x-model="tradeForm.trade_type" class="input w-full bg-[#111]">
      <option value="BUY">매수 (진입)</option>
      <option value="익절">익절 (이익 실현)</option>
      <option value="손절">손절 (손실 확정)</option>
      <option value="청산">청산 (전량 매도)</option>
    </select>
    <input x-model.number="tradeForm.shares" type="number" placeholder="수량 (주)" class="input w-full">
    <input x-model.number="tradeForm.price" type="number" placeholder="가격" class="input w-full">
    <input x-model="tradeForm.note" placeholder="메모 (선택)" class="input w-full">
    <button @click="submitTrade" class="btn btn-primary w-full">기록 저장</button>
  </div>
</div>

<header class="px-8 py-5 border-b border-cream-200 bg-cream-50/70 backdrop-blur sticky top-0 z-20">
  <div class="max-w-[1400px] mx-auto flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-lg bg-coral-500 flex items-center justify-center text-cream-50 serif text-xl font-semibold">T</div>
      <div>
        <div class="serif text-2xl font-semibold leading-none">Toss</div>
        <div class="text-xs text-ink-600 mt-0.5">Quant Assistant · 단기 트레이딩 리서치</div>
      </div>
    </div>
    <div class="flex items-center gap-5">
      <div class="flex items-center gap-2 text-sm text-ink-600">
        <span class="pulse-dot" :class="!wsConnected && 'off'"></span>
        <span x-text="wsConnected ? '실시간 스트림 연결됨' : '연결 끊김 — 재시도 중'"></span>
      </div>
      <div class="text-sm text-ink-600 font-mono" x-text="now"></div>
      <div x-show="user" class="flex items-center gap-2">
        <span class="text-sm text-ink-600" x-text="user?.username"></span>
        <button @click="doLogout" class="btn btn-ghost text-xs py-1 px-2">로그아웃</button>
      </div>
    </div>
  </div>
</header>

<main class="max-w-[1400px] mx-auto grid grid-cols-12 gap-5 px-8 py-6">

  <!-- ── 워치리스트 ─────────────────────────────────── -->
  <section class="col-span-3 space-y-5">
    <div class="surface-elevated p-5">
      <div class="flex items-baseline justify-between mb-4">
        <h2 class="serif text-xl font-semibold">워치리스트</h2>
        <span class="text-xs text-ink-500" x-text="watch.length + ' 종목'"></span>
      </div>
      <form @submit.prevent="addWatch" class="space-y-2.5 relative">
        <div class="relative">
          <input x-model="form.symbol" @input="searchStocks" @focus="showDropdown = true" @click.outside="showDropdown = false" placeholder="티커 또는 기업명 (예: 테슬라)" class="input w-full font-medium" autocomplete="off">
          <div x-show="showDropdown && searchResults.length > 0" class="absolute z-10 w-full mt-1 bg-[#111111] border border-[#333333] rounded-lg shadow-xl overflow-hidden">
            <template x-for="res in searchResults" :key="res.symbol">
              <div @click="selectStock(res)" class="px-4 py-2.5 hover:bg-[#222222] cursor-pointer flex justify-between items-center">
                <span class="text-sm font-semibold" x-text="res.symbol"></span>
                <span class="text-xs text-ink-500" x-text="res.name"></span>
              </div>
            </template>
          </div>
        </div>
        <div class="flex gap-2">
          <select x-model="form.currency" class="input w-1/3 text-sm bg-[#111111] border-[#333333]">
            <option value="USD">달러(USD)</option>
            <option value="KRW">원화(KRW)</option>
          </select>
          <input x-model="form.capital_str" @input="formatCapital" type="text" placeholder="투자금 입력 (빈칸시 기본값)" class="input w-2/3">
        </div>
        <input x-model.number="form.risk_pct" type="number" step="0.1" placeholder="리스크 % (기본 1.0)" class="input w-full">
        <button class="btn btn-primary w-full">종목 추가 및 분석</button>
      </form>
      <div class="divider my-4"></div>
      <ul class="space-y-1.5">
        <template x-for="w in watch" :key="w.symbol">
          <li @click="select(w.symbol)"
              class="group p-3 rounded-xl cursor-pointer transition hover:bg-cream-100"
              :class="selected===w.symbol && 'bg-coral-50 ring-1 ring-coral-500/30'">
            <div class="flex items-center justify-between">
              <div>
                <div class="serif font-semibold text-lg leading-none" x-text="w.symbol"></div>
                <div class="text-[11px] text-ink-500 mt-1.5">
                  자본 $<span x-text="w.capital.toLocaleString()"></span> · 리스크 <span x-text="w.risk_pct"></span>%
                </div>
              </div>
              <div class="text-right">
                <div class="font-mono text-sm font-semibold" x-text="ticks[w.symbol] ? cur(w.symbol)+ticks[w.symbol].price.toLocaleString(undefined,{maximumFractionDigits: isKR(w.symbol)?0:2}) : '—'"></div>
                <div class="text-[11px] font-mono mt-0.5"
                     :class="ticks[w.symbol]?.change_pct >= 0 ? 'ticker-up' : 'ticker-down'"
                     x-text="ticks[w.symbol] ? (ticks[w.symbol].change_pct>=0?'+':'') + ticks[w.symbol].change_pct.toFixed(2)+'%' : ''"></div>
              </div>
            </div>
          </li>
        </template>
        <template x-if="watch.length===0">
          <li class="text-center text-ink-500 text-sm py-8 px-2">
            아직 종목이 없습니다.<br>위에서 첫 종목을 추가하세요.
          </li>
        </template>
      </ul>
    </div>

    <!-- 포트폴리오 요약 -->
    <div class="surface-elevated p-4">
      <div class="serif text-sm font-semibold text-ink-800 mb-2">내 포트폴리오</div>
      <div class="grid grid-cols-2 gap-2 text-sm">
        <div><span class="text-ink-500">총 투자</span><br><span class="font-mono" x-text="'$'+portfolio.total_invested.toLocaleString()"></span></div>
        <div><span class="text-ink-500">총 회수</span><br><span class="font-mono" x-text="'$'+portfolio.total_returned.toLocaleString()"></span></div>
        <div><span class="text-ink-500">손익</span><br><span class="font-mono" :class="portfolio.total_pnl>=0?'ticker-up':'ticker-down'" x-text="(portfolio.total_pnl>=0?'+':'')+portfolio.total_pnl.toLocaleString()"></span></div>
        <div><span class="text-ink-500">수익률</span><br><span class="font-mono" :class="portfolio.total_pnl_pct>=0?'ticker-up':'ticker-down'" x-text="(portfolio.total_pnl_pct>=0?'+':'')+portfolio.total_pnl_pct+'%'"></span></div>
      </div>
      <button @click="showTradeModal=true; tradeForm.symbol=selected||''" class="btn btn-ghost w-full mt-3 text-xs">+ 매매 기록 추가</button>
    </div>

    <!-- 매매 히스토리 -->
    <div class="surface p-4 max-h-48 overflow-y-auto scroll-soft">
      <div class="serif text-sm font-semibold text-ink-800 mb-2">최근 매매</div>
      <template x-for="t in trades" :key="t.id">
        <div class="flex justify-between text-xs py-1 border-b border-[#222]">
          <span><span class="font-semibold" x-text="t.symbol"></span> <span :class="t.trade_type==='BUY'?'ticker-up':'ticker-down'" x-text="t.trade_type"></span></span>
          <span class="font-mono" x-text="t.shares+'주 @'+t.price.toLocaleString()"></span>
        </div>
      </template>
      <template x-if="trades.length===0"><div class="text-xs text-ink-500 text-center py-2">매매 기록이 없습니다</div></template>
    </div>
  </section>

  <!-- ── 메인 리포트 ────────────────────────────────── -->
  <section class="col-span-6 space-y-5">

    <!-- 빈 상태 -->
    <template x-if="!report && !loading">
      <div class="surface-elevated p-12 text-center">
        <div class="serif text-3xl font-semibold mb-2">실시간 퀀트 분석</div>
        <p class="text-ink-600 max-w-md mx-auto">
          티커를 추가하면 월가 기관급 프레임워크로 시세·뉴스·수급을
          종합한 리포트를 즉시 받아볼 수 있어요.
        </p>
      </div>
    </template>

    <!-- 로딩 -->
    <template x-if="loading">
      <div class="surface-elevated p-12 text-center">
        <div class="inline-block w-8 h-8 rounded-full border-2 border-coral-500 border-t-transparent animate-spin mb-3"></div>
        <div class="serif text-xl">분석 중…</div>
        <div class="text-ink-500 text-sm mt-1">시세 · 뉴스 · 매크로 컨텍스트를 종합하고 있습니다</div>
      </div>
    </template>

    <!-- 리포트 -->
    <template x-if="report && !loading">
      <div class="space-y-5">

        <!-- 헤드라인 -->
        <div class="surface-elevated p-6">
          <div class="flex items-start justify-between gap-6">
            <div>
              <div class="text-xs text-ink-500 uppercase tracking-widest mb-1">실시간 퀀트 분석 리포트</div>
              <div class="serif text-4xl font-semibold leading-tight" x-text="selected"></div>
              <div class="text-ink-600 mt-1" x-text="(report.profile?.name||'') + (report.profile?.finnhubIndustry ? ' · '+report.profile.finnhubIndustry : '')"></div>
            </div>
            <div class="text-right shrink-0">
              <div class="font-mono text-4xl font-semibold tracking-tight" x-text="cur(selected) + report.snapshot.quote.price.toLocaleString(undefined,{maximumFractionDigits: isKR(selected)?0:2})"></div>
              <div class="font-mono text-sm mt-1"
                   :class="report.snapshot.quote.change_pct >= 0 ? 'ticker-up' : 'ticker-down'"
                   x-text="(report.snapshot.quote.change_pct>=0?'▲':'▼')+' '+Math.abs(report.snapshot.quote.change_pct).toFixed(2)+'%'"></div>
              <div class="text-[11px] text-ink-500 mt-2 font-mono" x-text="'쿼트 '+ new Date(report.snapshot.quote.ts).toLocaleTimeString()"></div>
            </div>
          </div>

          <div class="grid grid-cols-4 gap-3 mt-5 pt-5 border-t border-cream-200">
            <div>
              <div class="text-[11px] text-ink-500 uppercase tracking-wider">금일 저</div>
              <div class="font-mono mt-0.5" x-text="cur(selected)+report.snapshot.quote.day_low.toLocaleString()"></div>
            </div>
            <div>
              <div class="text-[11px] text-ink-500 uppercase tracking-wider">금일 고</div>
              <div class="font-mono mt-0.5" x-text="cur(selected)+report.snapshot.quote.day_high.toLocaleString()"></div>
            </div>
            <div>
              <div class="text-[11px] text-ink-500 uppercase tracking-wider">시가</div>
              <div class="font-mono mt-0.5" x-text="cur(selected)+report.snapshot.quote.day_open.toLocaleString()"></div>
            </div>
            <div>
              <div class="text-[11px] text-ink-500 uppercase tracking-wider">RV (vs 20d)</div>
              <div class="font-mono mt-0.5"
                   :class="report.snapshot.quote.relative_volume >= 1.5 ? 'text-coral-600 font-semibold' : ''"
                   x-text="report.snapshot.quote.relative_volume.toFixed(2)+'x'"></div>
            </div>
          </div>

          <div class="flex gap-2 mt-5">
            <button @click="runAnalyze()" class="btn btn-primary">재분석</button>
            <button @click="removeWatch()" class="btn btn-ghost">제거</button>
            <a :href="'https://www.tradingview.com/symbols/'+selected" target="_blank" class="btn btn-ghost ml-auto">TradingView ↗</a>
          </div>
        </div>

        <!-- 포지션 카드 (강조) -->
        <div class="surface-elevated p-6 relative overflow-hidden">
          <div class="absolute -right-16 -top-16 w-56 h-56 rounded-full opacity-30"
               :class="positionTone(report.analysis.position)"></div>
          <div class="relative">
            <div class="text-[11px] text-ink-500 uppercase tracking-widest mb-2">현재 포지션</div>
            <div class="flex items-center gap-3 mb-3">
              <span class="text-3xl" x-text="report.analysis.position_emoji"></span>
              <span class="serif text-3xl font-semibold" x-text="report.analysis.position"></span>
              <span class="pill pill-stone" x-text="'신뢰도 '+report.analysis.confidence+'%'"></span>
            </div>
            <p class="text-ink-800 leading-relaxed" x-text="report.analysis.rationale"></p>
            <div class="flex flex-wrap gap-1.5 mt-4">
              <template x-for="f in (report.analysis.frameworks_triggered||[])">
                <span class="frame-chip" x-text="f"></span>
              </template>
            </div>
          </div>
        </div>

        <!-- 액션 플랜 -->
        <div class="grid grid-cols-3 gap-3">
          <div class="surface-elevated p-4">
            <div class="text-[11px] text-ink-500 uppercase tracking-wider">목표가</div>
            <div class="font-mono text-2xl font-semibold mt-1 text-olive-600" x-text="cur(selected)+(report.analysis.target_price||0).toLocaleString()"></div>
          </div>
          <div class="surface-elevated p-4">
            <div class="text-[11px] text-ink-500 uppercase tracking-wider" x-text="report.analysis.reentry_or_stop_label"></div>
            <div class="font-mono text-2xl font-semibold mt-1 text-rust-500" x-text="cur(selected)+(report.analysis.reentry_or_stop_price||0).toLocaleString()"></div>
          </div>
          <div class="surface-elevated p-4">
            <div class="text-[11px] text-ink-500 uppercase tracking-wider">R-Multiple</div>
            <div class="font-mono text-2xl font-semibold mt-1" x-text="report.analysis.r_multiple || '—'"></div>
          </div>
        </div>

        <!-- 사이징 -->
        <template x-if="report.sizing">
          <div class="surface-elevated p-5">
            <div class="flex items-center gap-2 mb-3">
              <div class="serif text-lg font-semibold">권장 포지션</div>
              <span class="pill pill-coral">capital × risk%</span>
            </div>
            <div class="grid grid-cols-4 gap-4">
              <div>
                <div class="text-[11px] text-ink-500 uppercase tracking-wider">총 주식수</div>
                <div class="font-mono text-2xl mt-1" x-text="report.sizing.shares + '주'"></div>
              </div>
              <div>
                <div class="text-[11px] text-ink-500 uppercase tracking-wider">분할 청크</div>
                <div class="font-mono text-2xl mt-1" x-text="report.sizing.splits.join(' / ')"></div>
              </div>
              <div>
                <div class="text-[11px] text-ink-500 uppercase tracking-wider">투입 금액</div>
                <div class="font-mono text-2xl mt-1" x-text="cur(selected)+report.sizing.notional.toLocaleString()"></div>
              </div>
              <div>
                <div class="text-[11px] text-ink-500 uppercase tracking-wider">최대 손실</div>
                <div class="font-mono text-2xl mt-1 text-rust-500" x-text="cur(selected)+report.sizing.max_loss.toLocaleString()"></div>
              </div>
            </div>
          </div>
        </template>

        <!-- 보유기간 / 매크로 -->
        <div class="grid grid-cols-2 gap-3">
          <div class="surface-elevated p-4">
            <div class="text-[11px] text-ink-500 uppercase tracking-wider">권장 보유 기간</div>
            <div class="serif text-xl mt-1" x-text="report.analysis.holding_period"></div>
            <div class="text-sm text-ink-600 mt-1" x-text="report.analysis.holding_period_reason"></div>
          </div>
          <div class="surface-elevated p-4">
            <div class="text-[11px] text-ink-500 uppercase tracking-wider">매크로 레짐</div>
            <div class="serif text-xl mt-1" x-text="report.analysis.macro_regime || '—'"></div>
          </div>
        </div>

        <!-- 수급 동향 -->
        <div class="surface-elevated p-5">
          <div class="serif text-lg font-semibold mb-3">시장 수급 (US Market Flow)</div>
          <div class="grid grid-cols-3 gap-4">
            <div>
              <div class="text-[11px] text-ink-500 uppercase tracking-wider">기관 (Institutional)</div>
              <div class="mt-1.5 flex items-center gap-2">
                <span class="pill" :class="flowTone(report.analysis.flow_institutional)" x-text="report.analysis.flow_institutional"></span>
              </div>
              <div class="text-sm text-ink-600 mt-2 leading-relaxed" x-text="report.analysis.flow_institutional_reason"></div>
            </div>
            <div>
              <div class="text-[11px] text-ink-500 uppercase tracking-wider">개인 (Retail)</div>
              <div class="mt-1.5">
                <span class="pill" :class="flowTone(report.analysis.flow_retail)" x-text="report.analysis.flow_retail"></span>
              </div>
            </div>
            <div>
              <div class="text-[11px] text-ink-500 uppercase tracking-wider">특이사항</div>
              <div class="text-sm text-ink-700 mt-2 leading-relaxed" x-text="report.analysis.flow_special"></div>
            </div>
          </div>
        </div>

        <!-- 마켓 컨텍스트 + 뉴스 -->
        <div class="surface-elevated p-5">
          <div class="serif text-lg font-semibold mb-2">실시간 마켓 컨텍스트</div>
          <p class="text-ink-800 leading-relaxed" x-text="report.analysis.market_context"></p>
          <div class="divider my-4"></div>
          <div class="text-[11px] text-ink-500 uppercase tracking-wider mb-2">관련 헤드라인</div>
          <ul class="space-y-2">
            <template x-for="n in report.news" :key="n.url">
              <li class="text-sm leading-relaxed">
                <a :href="n.url" target="_blank" class="text-ink-800 hover:text-coral-600 transition">
                  <span x-text="n.headline"></span>
                </a>
                <span class="text-ink-500 text-xs ml-1.5" x-text="'· '+n.source"></span>
              </li>
            </template>
          </ul>
        </div>

        <!-- 차트 -->
        <div class="surface-elevated p-2 overflow-hidden">
          <iframe :src="'https://s.tradingview.com/widgetembed/?frameElementId=tv&symbol=' + (isKR(selected)?'KRX:'+selected:selected) + '&interval=15&theme=dark&style=1&hide_side_toolbar=1'"
                  class="w-full rounded-2xl" style="height:440px;border:0"></iframe>
        </div>

      </div>
    </template>
  </section>

  <!-- ── 알림 ──────────────────────────────────────── -->
  <aside class="col-span-3 space-y-4">
    <div class="surface-elevated p-5 sticky top-24">
      <div class="flex items-center justify-between mb-1">
        <h2 class="serif text-xl font-semibold">실시간 알림</h2>
        <span class="pill pill-coral" x-text="alerts.length + ' 건'"></span>
      </div>
      <p class="text-xs text-ink-600 leading-relaxed mb-3">
        진입가/목표가/손절가 도달 시 브라우저 푸시.
        <button @click="enableNotif" class="text-coral-600 underline underline-offset-2 hover:text-coral-700">알림 권한 켜기</button>
      </p>
      <div class="divider mb-3"></div>
      <ul class="space-y-2 max-h-[70vh] overflow-y-auto scroll-soft pr-1">
        <template x-for="(a,i) in alerts" :key="i">
          <li class="surface p-3 flash-in">
            <div class="flex items-center justify-between mb-1">
              <span class="serif font-semibold text-base" x-text="a.symbol"></span>
              <span class="pill" :class="alertTone(a.kind)" x-text="alertLabel(a.kind)"></span>
            </div>
            <div class="text-sm text-ink-800 leading-snug" x-text="a.message"></div>
            <div class="text-[11px] text-ink-500 font-mono mt-1.5"
                 x-text="new Date((a.ts||a.created_at||0)*1000||Date.now()).toLocaleTimeString()"></div>
          </li>
        </template>
        <template x-if="alerts.length===0">
          <li class="text-center text-ink-500 text-sm py-6">알림이 발생하면 여기에 표시됩니다.</li>
        </template>
      </ul>
    </div>
  </aside>
</main>

<audio id="ding" preload="auto">
  <source src="data:audio/wav;base64,UklGRoQEAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YWAEAACAg" type="audio/wav">
</audio>

<script>
function app(){
  return {
    form: { symbol:'', capital: '', capital_str: '', currency: 'USD', risk_pct: 1 },
    watch: [], ticks: {}, alerts: [], selected: null, report: null,
    loading: false, wsConnected: false, now: '',
    krwRate: 1400,
    // 인증
    user: JSON.parse(localStorage.getItem('toss_user') || 'null'),
    authForm: { username: '', password: '' },
    authError: '',
    // 매매기록
    showTradeModal: false,
    tradeForm: { symbol: '', trade_type: 'BUY', shares: 0, price: 0, note: '' },
    trades: [],
    portfolio: { total_invested:0, total_returned:0, total_pnl:0, total_pnl_pct:0, trades_count:0 },

    init(){
      if(this.user) { this.refresh(); this.loadTrades(); }
      this.connect(); this.fetchExchangeRate();
      const tick = () => this.now = new Date().toLocaleString('ko-KR', { hour12:false });
      tick(); setInterval(tick, 1000);
    },
    async doLogin() {
      this.authError = '';
      try {
        const r = await fetch('/api/login', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify(this.authForm) });
        if(!r.ok) { this.authError = (await r.json()).detail; return; }
        this.user = await r.json();
        localStorage.setItem('toss_user', JSON.stringify(this.user));
        this.refresh(); this.loadTrades();
      } catch(e) { this.authError = '서버 연결 실패'; }
    },
    async doRegister() {
      this.authError = '';
      try {
        const r = await fetch('/api/register', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify(this.authForm) });
        if(!r.ok) { this.authError = (await r.json()).detail; return; }
        this.user = await r.json();
        localStorage.setItem('toss_user', JSON.stringify(this.user));
        this.refresh(); this.loadTrades();
      } catch(e) { this.authError = '서버 연결 실패'; }
    },
    doLogout() { this.user = null; localStorage.removeItem('toss_user'); this.watch = []; this.trades = []; },
    uid() { return this.user?.id || 0; },
    async refresh(){
      this.watch = await (await fetch('/api/watchlist?user_id='+this.uid())).json();
      const a = await (await fetch('/api/alerts')).json();
      this.alerts = a.map(x => ({...x, ts: x.created_at}));
    },
    async loadTrades() {
      this.trades = await (await fetch('/api/trades?user_id='+this.uid())).json();
      this.portfolio = await (await fetch('/api/portfolio?user_id='+this.uid())).json();
    },
    async submitTrade() {
      if(!this.tradeForm.shares || !this.tradeForm.price) return alert('수량과 가격을 입력하세요');
      await fetch('/api/trades', { method:'POST', headers:{'content-type':'application/json'},
        body: JSON.stringify({...this.tradeForm, user_id: this.uid()}) });
      this.showTradeModal = false;
      this.loadTrades();
    },
    async fetchExchangeRate() {
      try {
        const res = await fetch('https://open.er-api.com/v6/latest/USD');
        const data = await res.json();
        if (data && data.rates && data.rates.KRW) {
          this.krwRate = data.rates.KRW;
        }
      } catch (e) {
        console.error('환율 연동 실패', e);
      }
    },
    connect(){
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${protocol}//${location.host}/ws`);
      ws.onopen = ()=> this.wsConnected = true;
      ws.onclose = ()=> { this.wsConnected = false; setTimeout(()=>this.connect(), 2000); };
      ws.onmessage = (e)=>{
        const m = JSON.parse(e.data);
        if(m.type==='tick') this.ticks[m.symbol] = m;
        else if(m.type==='alert'){
          this.alerts.unshift({...m, ts: Date.now()/1000});
          this.notify(m);
        }
      };
    },
    
    // 자동완성 데이터
    stockDb: [
      { symbol: 'TSLA', name: 'Tesla 테슬라' },
      { symbol: 'AAPL', name: 'Apple 애플' },
      { symbol: 'NVDA', name: 'Nvidia 엔비디아' },
      { symbol: 'MSFT', name: 'Microsoft 마이크로소프트' },
      { symbol: 'AMZN', name: 'Amazon 아마존' },
      { symbol: 'GOOGL', name: 'Alphabet 구글' },
      { symbol: 'META', name: 'Meta 메타' },
      { symbol: 'MSTR', name: 'MicroStrategy 마이크로스트레티지' },
      { symbol: '005930', name: '삼성전자' },
      { symbol: '000660', name: 'SK하이닉스' },
      { symbol: '035720', name: '카카오' },
      { symbol: '035420', name: 'NAVER 네이버' },
    ],
    showDropdown: false,
    searchResults: [],
    
    searchStocks() {
      const q = this.form.symbol.toLowerCase().trim();
      if(!q) { this.searchResults = []; return; }
      this.searchResults = this.stockDb.filter(s => 
        s.symbol.toLowerCase().includes(q) || s.name.toLowerCase().includes(q)
      ).slice(0, 5);
      this.showDropdown = true;
    },
    selectStock(res) {
      this.form.symbol = res.symbol;
      this.showDropdown = false;
    },
    formatCapital() {
      let val = this.form.capital_str.replace(/[^\d]/g, '');
      if(val) {
        this.form.capital = parseInt(val, 10);
        this.form.capital_str = this.form.capital.toLocaleString();
      } else {
        this.form.capital = '';
        this.form.capital_str = '';
      }
    },

    select(sym){ this.selected = sym; this.report = null; this.runAnalyze(); },
    async addWatch(){
      if(!this.form.symbol) return;
      const sym = this.form.symbol.toUpperCase().trim();
      
      // 통화 변환 (원화 <-> 달러) 실시간 환율 적용
      let finalCapital = parseFloat(this.form.capital) || 1000; // 빈칸이면 기본값 1000
      const isKoreanStock = this.isKR(sym);
      if (this.form.currency === 'KRW' && !isKoreanStock) {
        finalCapital = finalCapital / this.krwRate; 
      } else if (this.form.currency === 'USD' && isKoreanStock) {
        finalCapital = finalCapital * this.krwRate;
      }

      await fetch('/api/watchlist', { method:'POST',
        headers:{'content-type':'application/json'},
        body: JSON.stringify({...this.form, symbol: sym, capital: finalCapital, user_id: this.uid()})});
      this.selected = sym;
      this.form.symbol = '';
      await this.refresh();
      this.runAnalyze();
    },
    async removeWatch(){
      if(!this.selected || !confirm(this.selected + ' 제거할까요?')) return;
      await fetch('/api/watchlist/'+this.selected+'?user_id='+this.uid(), {method:'DELETE'});
      this.selected = null; this.report = null;
      await this.refresh();
    },
    async runAnalyze(){
      if(!this.selected) return;
      this.loading = true;
      try{
        const r = await fetch('/api/analyze/'+this.selected, {method:'POST'});
        if(!r.ok) throw new Error(await r.text());
        this.report = await r.json();
      }catch(e){ alert('분석 실패: '+e.message); }
      finally{ this.loading = false; }
    },
    enableNotif(){ if('Notification' in window) Notification.requestPermission(); },
    notify(m){
      try { document.getElementById('ding').play().catch(()=>{}); } catch{}
      if('Notification' in window && Notification.permission==='granted'){
        new Notification(`Toss · ${m.symbol} ${this.alertLabel(m.kind)}`, { body: m.message });
      }
    },
    positionTone(p){
      if(!p) return 'bg-cream-300';
      if(p.includes('적극 매수')||p.includes('분할 매수')) return 'bg-olive-500';
      if(p.includes('적극 매도')||p.includes('분할 매도')) return 'bg-rust-500';
      return 'bg-cream-400';
    },
    flowTone(f){
      if(!f) return 'pill-stone';
      if(f.includes('매수')||f.includes('강한')) return 'pill-olive';
      if(f.includes('매도')) return 'pill-rust';
      return 'pill-stone';
    },
    alertTone(k){
      if(k==='BUY') return 'pill-olive';
      if(k==='SL'||k==='SELL') return 'pill-rust';
      if(k==='TP') return 'pill-coral';
      return 'pill-stone';
    },
    alertLabel(k){
      return ({BUY:'매수 신호', TP:'익절 도달', SL:'손절 이탈', SELL:'매도 신호'})[k] || k;
    },
    isKR(sym){ return sym && /^\d{6}$/.test(sym); },
    cur(sym){ return this.isKR(sym) ? '₩' : '$'; },
  }
}
</script>
</body>
</html>
